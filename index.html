<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sana Özel Bir Bahçe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #080a08;
            font-family: 'Quicksand', sans-serif;
            touch-action: none;
        }

        canvas { display: block; filter: contrast(110%) brightness(90%); }

        .ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: none; z-index: 10;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 80%; max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            opacity: 0;
            transition: all 1s ease;
            position: relative;
            pointer-events: auto; /* Kart tıklanabilir olmalı */
        }

        /* Kapatma Çarpısı */
        .close-btn {
            position: absolute; top: 15px; right: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 24px; cursor: pointer;
            transition: 0.3s; line-height: 1;
        }
        .close-btn:hover { color: #fff; }

        h1 { 
            font-family: 'Dancing Script', cursive;
            font-size: 3rem; color: #fff; margin: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        p { color: rgba(255,255,255,0.7); font-weight: 300; line-height: 1.8; margin-top: 20px; }

        /* Başlangıç Ekranı */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 100; display: flex;
            justify-content: center; align-items: center;
            transition: opacity 1.5s ease;
        }

        .start-btn {
            background: none; border: 1px solid #fff; color: #fff;
            padding: 15px 40px; border-radius: 50px; cursor: pointer;
            font-size: 1rem; letter-spacing: 3px;
        }

        /* Müzik Kontrolü (Küçük ikon) */
        #music-toggle {
            position: fixed; bottom: 20px; right: 20px;
            color: rgba(255,255,255,0.3); font-size: 20px;
            cursor: pointer; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="start-btn" onclick="startExperience()">BAHÇEYE GİR</button>
    </div>

    <div class="ui-layer">
        <div id="main-card" class="glass-card">
            <div class="close-btn" onclick="closeCard()">×</div>
            <h1>Senin İçin...</h1>
            <p>Hayatın kalabalığında bazen durup sadece bu papatyaları izle. Onlar senin dokunuşunla parlıyor...</p>
        </div>
    </div>

    <div id="music-toggle" onclick="toggleMusic()">🎵</div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const music = document.getElementById('bg-music');
        let width, height, particles = [];
        const mouse = { x: undefined, y: undefined, radius: 150 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouse.radius = (width < 600) ? 90 : 180;
            initParticles();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = (Math.random() * 6) + 3;
                this.density = (Math.random() * 30) + 10;
                this.angle = Math.random() * 360;
                this.spin = (Math.random() - 0.5) * 0.1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
                for(let i=0; i<8; i++) {
                    ctx.rotate(Math.PI/4);
                    ctx.beginPath();
                    ctx.ellipse(this.size*1.3, 0, this.size, this.size/3, 0, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.beginPath();
                ctx.arc(0, 0, this.size*0.7, 0, Math.PI*2);
                ctx.fillStyle = "#FFD700";
                ctx.fill();
                ctx.restore();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.x += (dx / distance) * force * this.density;
                    this.y += (dy / distance) * force * this.density;
                } else {
                    this.x -= (this.x - this.baseX) * 0.05;
                    this.y -= (this.y - this.baseY) * 0.05;
                }
                this.angle += this.spin;
            }
        }

        function initParticles() {
            particles = [];
            let count = (width < 600) ? 180 : 400;
            for(let i=0; i<count; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.fillStyle = 'rgba(8, 10, 8, 0.2)';
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function startExperience() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').style.display = 'none';
                document.getElementById('main-card').style.opacity = '1';
            }, 1500);
            music.play();
            resize();
            animate();
        }

        function closeCard() {
            document.getElementById('main-card').style.opacity = '0';
            document.getElementById('main-card').style.pointerEvents = 'none';
        }

        function toggleMusic() {
            if (music.paused) music.play(); else music.pause();
        }

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
