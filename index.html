<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sana Özel Bir Bahçe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #080a08;
            font-family: 'Quicksand', sans-serif;
            touch-action: none;
        }

        canvas { display: block; filter: contrast(110%) brightness(90%); }

        .ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: none; z-index: 10;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            width: 80%; max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            opacity: 0;
            transition: opacity 2s ease;
        }

        h1 { 
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem; color: #fff; margin: 0;
            text-shadow: 0 0 30px rgba(255,255,255,0.4);
        }

        p { color: rgba(255,255,255,0.6); font-weight: 300; line-height: 1.8; margin-top: 20px; font-size: 1.1rem; }

        .hint-text {
            position: absolute; bottom: 40px;
            color: rgba(255,255,255,0.2);
            font-size: 0.7rem; letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* Başlangıç Ekranı */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a201a 0%, #050505 100%);
            z-index: 100; display: flex;
            justify-content: center; align-items: center;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .start-btn {
            background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff;
            padding: 18px 50px; border-radius: 2px; cursor: pointer;
            font-family: 'Quicksand', sans-serif; font-size: 0.9rem;
            letter-spacing: 4px; transition: all 0.5s;
        }

        .start-btn:hover { background: #fff; color: #000; box-shadow: 0 0 30px #fff; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="start-btn" onclick="startExperience()">KEŞFETMEYE BAŞLA</button>
    </div>

    <div class="ui-layer">
        <div id="main-card" class="glass-card">
            <h1>Senin İçin...</h1>
            <p>Bu bahçe sadece sana özel açar. Ekrana dokun, papatyalar senin ışığını takip etsin.</p>
        </div>
        <div class="hint-text">Parmaklarınla Papatyalara Dokun</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        const mouse = { x: undefined, y: undefined, radius: 150 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouse.radius = (width < 600) ? 90 : 180;
            initParticles();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = (Math.random() * 7) + 3;
                this.density = (Math.random() * 30) + 10;
                this.angle = Math.random() * 360;
                this.spin = (Math.random() - 0.5) * 0.1;
                this.distanceFactor = Math.random() * 0.1 + 0.02;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                
                // Papatya Yaprakları (Gelişmiş Form)
                ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                for(let i=0; i<8; i++) {
                    ctx.rotate(Math.PI/4);
                    ctx.beginPath();
                    ctx.ellipse(this.size*1.3, 0, this.size, this.size/3, 0, 0, Math.PI*2);
                    ctx.fill();
                }

                // Altın Sarısı Tohum
                ctx.beginPath();
                ctx.arc(0, 0, this.size*0.8, 0, Math.PI*2);
                ctx.fillStyle = "#FFD700";
                ctx.fill();
                ctx.restore();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    let moveX = (dx / distance) * force * this.density;
                    let moveY = (dy / distance) * force * this.density;
                    this.x += moveX;
                    this.y += moveY;
                } else {
                    this.x -= (this.x - this.baseX) * this.distanceFactor;
                    this.y -= (this.y - this.baseY) * this.distanceFactor;
                }
                this.angle += this.spin;
            }
        }

        function initParticles() {
            particles = [];
            let particleCount = (width < 600) ? 180 : 450;
            for(let i=0; i<particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(8, 10, 8, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        const handleMove = (e) => {
            const pos = e.touches ? e.touches[0] : e;
            mouse.x = pos.clientX;
            mouse.y = pos.clientY;
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchstart', handleMove);
        window.addEventListener('touchend', () => { mouse.x = undefined; mouse.y = undefined; });
        window.addEventListener('resize', resize);

        function startExperience() {
            const overlay = document.getElementById('start-overlay');
            overlay.style.opacity = '0';
            overlay.style.transform = 'scale(1.2)';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('main-card').style.opacity = '1';
            }, 1500);
            
            // Buraya istersen huzurlu bir müzik linki ekleyebiliriz
            resize();
            animate();
        }

        resize();
    </script>
</body>
</html>
