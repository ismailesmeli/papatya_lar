<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sadece Dokun...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:ital@1&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #050705;
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
        }

        #canvas { display: block; cursor: crosshair; }

        #ui-overlay {
            position: absolute; top: 10%; width: 100%;
            text-align: center; pointer-events: none; z-index: 10;
        }

        #message {
            color: #fff; font-family: 'Playfair Display', serif;
            font-size: 1.5rem; font-style: italic;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
            opacity: 0; transition: all 1s ease;
            padding: 0 20px; line-height: 1.6;
        }

        #counter {
            position: absolute; bottom: 5%; width: 100%;
            text-align: center; color: rgba(255,255,255,0.2);
            font-size: 0.7rem; letter-spacing: 4px;
        }
    </style>
</head>
<body onclick="interact(event)" ontouchstart="interact(event)">

    <div id="ui-overlay">
        <div id="message">Karanlığa dokun, bir hayat başlasın...</div>
    </div>
    <div id="counter">KEŞFETMEK İÇİN DOKUN</div>
    <canvas id="canvas"></canvas>

   <audio id="ambient" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('message');
        const audio = document.getElementById('ambient');

        let width, height, particles = [];
        let step = 0;
        let laleBoyutu = 0;

        const hikaye = [
           "Her şey küçük bir hatayla karardı belki...",
"Ama kalbimde sana olan yer hiç değişmedi.",
"Bazen insan en değer verdiğini istemeden kırabiliyor.",
"Keşke zamanı geri alabilsem dediğim anlar oldu.",
"Ama bildiğim bir şey var…",
"Kalbimde açan en güzel çiçek(eşşek) sensin.",
"Fırtınalar bazen bahçeleri sarsar.",
"Ama gerçek çiçekler köklerinden vazgeçmez.",
"Ben de senden vazgeçmeyeceğim.",
"Her hatamdan sonra seni daha çok anlıyorum.",
"Her gün seni daha çok değer verdiğimi anladım.",
"Çünkü sen benim hayatımdaki en güzel eşşeksinnn.",
"Eğer izin verirsen…",
"Bu lalenin her yaprağı gibi kalbindeki eşşeğin olmak istiyorum.",
"Ve sana şunu söylemek istiyorum:",
"Seni kırdığım için gerçekten üzgünüm.",
"Ama senin eşşeğin olmaktan asla vazgeçmicem."
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Polen {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 2 + 1;
                this.vX = (Math.random() - 0.5) * 6;
                this.vY = (Math.random() - 0.5) * 6;
                this.alpha = 1;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
            update() {
                this.x += this.vX; this.y += this.vY;
                this.alpha -= 0.01;
            }
        }

        function drawLale(x, y, size, progress) {
            ctx.save();
            ctx.translate(x, y);
            
            // Sap
            ctx.beginPath();
            ctx.strokeStyle = `rgba(100, 160, 90, ${Math.min(progress, 0.6)})`;
            ctx.lineWidth = 4;
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(10 * Math.sin(Date.now()*0.002), 50, 0, 200);
            ctx.stroke();

            // Yaprak Çizim Fonksiyonu
            const drawPetal = (rot, s, color) => {
                ctx.save();
                ctx.rotate(rot);
                ctx.beginPath();
                ctx.fillStyle = color;
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-s/2, -s/2, 0, -s);
                ctx.quadraticCurveTo(s/2, -s/2, 0, 0);
                ctx.fill();
                ctx.restore();
            };

            // Gelişen yapraklar
            if(step > 0) {
                let opacity = Math.min(progress * 0.2, 1);
                // Arka yapraklar
                drawPetal(-0.5 * progress, size * 0.8, `rgba(230, 230, 230, ${opacity})`);
                drawPetal(0.5 * progress, size * 0.8, `rgba(230, 230, 230, ${opacity})`);
                // Orta yapraklar
                drawPetal(-0.2 * progress, size, `rgba(255, 255, 255, ${opacity})`);
                drawPetal(0.2 * progress, size, `rgba(255, 255, 255, ${opacity})`);
                // Ana yaprak
                drawPetal(0, size * 1.1, `rgba(255, 255, 255, ${opacity + 0.2})`);
            }
            ctx.restore();
        }

        function interact(e) {
            e.preventDefault();
            if (step < hikaye.length) {
                if (step === 0) audio.play();
                
                // Efekt oluştur
                let x = e.clientX || e.touches[0].clientX;
                let y = e.clientY || e.touches[0].clientY;
                for(let i=0; i<30; i++) particles.push(new Polen(x, y));

                // Mesajı güncelle
                msg.style.opacity = 0;
                setTimeout(() => {
                    msg.innerText = hikaye[step];
                    msg.style.opacity = 1;
                    step++;
                    laleBoyutu += 8;
                }, 500);
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 7, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            drawLale(width/2, height/1.8, laleBoyutu, step * 0.3);

            particles.forEach((p, i) => {
                p.update(); p.draw();
                if(p.alpha <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
